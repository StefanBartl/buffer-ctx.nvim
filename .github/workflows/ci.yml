name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: stylua + luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned (not "latest"): stylua's own rule changes between releases
      # would otherwise make this gate fail without any local diff to blame.
      - name: stylua (check only)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.5.2
          args: --check lua/ docs/TESTS/

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: luacheck
        run: luacheck lua/ docs/TESTS/ plugin/

  test:
    name: headless specs (Neovim ${{ matrix.nvim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
        with:
          path: buffer-ctx.nvim

      # lib.nvim is now a real runtime dependency of the default setup() path
      # (:Insert/:Copy/:Format/:Mark all require lib.nvim.usercmd.composer at
      # module load, not just lazily) as of the composer migration -- checked
      # out as a sibling so `rtp+=../lib.nvim` matches docs/TESTS/run.lua's own
      # sibling-checkout lookup.
      - uses: actions/checkout@v4
        with:
          repository: StefanBartl/lib.nvim
          path: lib.nvim

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}

      - name: Run docs/TESTS/run.lua
        working-directory: buffer-ctx.nvim
        run: nvim --headless -u NONE -c "set rtp+=." -l docs/TESTS/run.lua

  health:
    name: checkhealth loads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: buffer-ctx.nvim

      - uses: actions/checkout@v4
        with:
          repository: StefanBartl/lib.nvim
          path: lib.nvim

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: setup() + :checkhealth buffer_ctx
        working-directory: buffer-ctx.nvim
        run: |
          nvim --headless -u NONE \
            -c "set rtp+=.,../lib.nvim" \
            -c "lua require('buffer_ctx').setup({})" \
            -c "checkhealth buffer_ctx" \
            -c "qa!"
